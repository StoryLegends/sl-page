<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>StoryLegends Advanced Background Configurator</title>
  <style>
    :root {
      /* Colors in RGB comma format */
      --color1: 255, 215, 0; 
      --color2: 0, 191, 255; 
      --bg-color: #050505;
      
      /* Glowing and Layout offsets */
      --brightness: 1.2;
      --distance: 0vw;      /* O means neutral (33vw baseline) */
      --bg-rotate: 0deg;    /* 0 means neutral (-25deg baseline) */
      --center-glow: 0;     /* 0 means neutral (0.11 base opacity) */
      --speed-mult: 1;

      /* Grid Setup */
      --grid-opacity: 0.05;
      --grid-size: 50px;
      --grid-speed: 5s;
      --grid-pitch: 0deg;

      /* Effects */
      --vignette-str: 0.8;
      --blur-amount: 100px;
    }
    
    body, html {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background-color: var(--bg-color);
      color-scheme: dark;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    .bg-animation {
      position: absolute; inset: 0;
      z-index: 1;
      filter: brightness(var(--brightness));
    }

    .blob-rotator {
      position: absolute;
      top: -50vh; left: -50vw; width: 200vw; height: 200vh;
      /* Base rotation of -25deg baked in! */
      transform: rotate(calc(-25deg + var(--bg-rotate)));
      transform-origin: center;
      pointer-events: none;
    }

    @keyframes pulse-slow {
      0% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.25); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(2deg); }
    }

    .blob {
      position: absolute; border-radius: 50%;
      mix-blend-mode: screen;
      pointer-events: none;
    }
    
    /* Base distance of 33vw baked into the 30vw (total 63vw offset) */
    .blob1 {
      top: calc(50% - 63vw - var(--distance)); 
      left: calc(50% - 63vw - var(--distance)); 
      width: 60vw; height: 60vw;
      filter: blur(var(--blur-amount));
      background-color: rgba(var(--color1), 0.25);
      animation: pulse-slow calc(8s / var(--speed-mult)) infinite alternate ease-in-out;
    }

    .blob2 {
      bottom: calc(50% - 63vw - var(--distance)); 
      right: calc(50% - 63vw - var(--distance)); 
      width: 60vw; height: 60vw;
      filter: blur(var(--blur-amount));
      background-color: rgba(var(--color2), 0.25);
      animation: pulse-slow calc(10s / var(--speed-mult)) infinite alternate ease-in-out;
      animation-delay: -2s;
    }

    /* Core center glow base 0.11 baked in */
    .center-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 80vw; height: 80vw;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      filter: blur(150px);
      background-color: rgba(var(--color1), calc(0.11 + var(--center-glow)));
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .orb1 {
      top: 25%; right: 25%; width: 400px; height: 400px;
      filter: blur(80px);
      background-color: rgba(var(--color1), 0.15);
      animation: float calc(12s / var(--speed-mult)) ease-in-out infinite;
    }

    .orb2 {
      bottom: 25%; left: 25%; width: 500px; height: 500px;
      filter: blur(100px);
      background-color: rgba(var(--color2), 0.15);
      animation: float calc(15s / var(--speed-mult)) ease-in-out infinite;
      animation-delay: -5s;
    }

    @keyframes move-grid {
      0% { background-position: 0 0; }
      100% { background-position: var(--grid-size) var(--grid-size); }
    }

    .grid-wrapper {
      position: absolute; inset: 0;
      perspective: 800px;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    .grid {
      position: absolute; 
      top: -100%; left: -100%; right: -100%; bottom: -100%;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,var(--grid-opacity)) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,var(--grid-opacity)) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      animation: move-grid var(--grid-speed) linear infinite;
      transform: rotateX(var(--grid-pitch));
      transform-origin: center center;
      filter: url(#wave-filter);
    }

    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,var(--vignette-str)) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* UI SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    /* UI Panel */
    #ui-panel {
      box-sizing: border-box;
      position: absolute; top: 20px; right: 20px; z-index: 10;
      background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
      padding: 24px; width: 340px; color: white;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
      transition: opacity 0.3s, transform 0.3s;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }
    #ui-panel.hidden { opacity: 0; pointer-events: none; transform: translateX(20px); }
    
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .panel-header h2 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    
    .section-title { 
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: #888; margin: 24px 0 12px 0; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 6px;
    }

    .control-group { margin-bottom: 16px; }
    label { display: flex; justify-content: space-between; font-size: 13px; color: #ddd; margin-bottom: 8px; font-weight: 600; }
    .val-disp { color: #FFD700; font-family: monospace; }
    
    input[type="range"] { 
        width: 100%; accent-color: #FFD700; height: 6px; 
        background: rgba(255,255,255,0.1); border-radius: 4px; appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
        appearance: none; width: 16px; height: 16px; background: #FFD700; border-radius: 50%; cursor: pointer;
        box-shadow: 0 0 10px rgba(255,215,0,0.5);
    }
    
    .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .color-item { display: flex; flex-direction: column; }
    input[type="color"] { 
        width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; 
        background: transparent; padding: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; }
    
    .btn {
      width: 100%; padding: 16px; background: #FFD700; color: #000;
      border: none; border-radius: 14px; font-weight: 900; font-size: 15px;
      cursor: pointer; transition: 0.2s; margin-top: 24px;
      box-shadow: 0 4px 15px rgba(255,215,0,0.3);
    }
    .btn:hover { background: #ffe44d; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,215,0,0.4); }
    
    .hint { font-size: 12px; color: #888; text-align: center; margin-top: 16px; line-height: 1.5; }

    #obs-link-box {
      margin-top: 16px; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 8px; 
      font-family: monospace; font-size: 10px; word-break: break-all; color: #FFD700;
      border: 1px solid rgba(255,215,0,0.2); display: none;
    }
    
    .toggle-ui { position: absolute; bottom: 20px; right: 20px; z-index: 20; background: rgba(0,0,0,0.5); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <!-- Инлайн SVG-фильтр для эффекта волнистости (Turbulence) -->
  <svg width="0" height="0" style="position: absolute; pointer-events: none;">
    <filter id="wave-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="1" result="noise" />
      <feDisplacementMap id="wave-disp" in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="bg-animation">
    <div class="blob-rotator">
      <div class="blob blob1"></div>
      <div class="blob blob2"></div>
      <div class="blob orb1"></div>
      <div class="blob orb2"></div>
      <div class="center-glow"></div>
    </div>
  </div>

  <div class="grid-wrapper">
    <div class="grid" id="grid-layer"></div>
  </div>

  <div class="vignette"></div>

  <button class="toggle-ui" id="btn-toggle-ui">Скрыть/Показать UI</button>

  <div id="ui-panel">
    <div class="panel-header">
      <h2>Конфигуратор</h2>
    </div>

    <!-- ЦВЕТА -->
    <div class="section-title">Цвета и Фон</div>
    <div class="color-grid control-group">
        <div class="color-item"><label>Цвет 1</label><input type="color" id="c1" value="#FFD700"></div>
        <div class="color-item"><label>Цвет 2</label><input type="color" id="c2" value="#00BFFF"></div>
        <div class="color-item" style="grid-column: span 2"><label>Цвет Фона</label><input type="color" id="bgc" value="#050505"></div>
    </div>

    <!-- ОСВЕЩЕНИЕ И ФОРМЫ -->
    <div class="section-title">Освещение и Формы</div>
    <div class="control-group">
      <label>Яркость свечения <span class="val-disp" id="val-bright">1.2</span></label>
      <input type="range" id="bright" min="0.1" max="3" step="0.1" value="1.2">
    </div>
    <div class="control-group">
      <label>Размытие (Размер) <span class="val-disp" id="val-blur">100px</span></label>
      <input type="range" id="blur" min="10" max="300" step="10" value="100">
    </div>
    <div class="control-group">
      <label>Расположение (Смещение) <span class="val-disp" id="val-dist">0%</span></label>
      <input type="range" id="dist" min="-50" max="50" step="1" value="0">
    </div>
    <div class="control-group">
      <label>Вращение пятен (Отклонение) <span class="val-disp" id="val-rot">0°</span></label>
      <input type="range" id="rot" min="-180" max="180" step="1" value="0">
    </div>
    <div class="control-group">
      <label>Заливка центра (Смещение) <span class="val-disp" id="val-glow">0%</span></label>
      <input type="range" id="glow" min="-11" max="89" step="1" value="0">
    </div>
    <div class="control-group">
      <label>Виньетка (Затемнение) <span class="val-disp" id="val-vig">80%</span></label>
      <input type="range" id="vig" min="0" max="100" step="1" value="80">
    </div>

    <!-- СЕТКА И ИСКАЖЕНИЯ -->
    <div class="section-title">Сетка и Искажения</div>
    <div class="control-group">
      <label>Видимость сетки <span class="val-disp" id="val-grid-op">5%</span></label>
      <input type="range" id="grid-op" min="0" max="30" step="1" value="5">
    </div>
    <div class="control-group">
      <label>Масштаб ячеек <span class="val-disp" id="val-grid-sz">50px</span></label>
      <input type="range" id="grid-sz" min="10" max="200" step="5" value="50">
    </div>
    <div class="control-group">
      <label>Искажение 3D (Наклон) <span class="val-disp" id="val-grid-pitch">0°</span></label>
      <input type="range" id="grid-pitch" min="0" max="80" step="1" value="0">
    </div>
    <div class="control-group">
      <label>Волнистость (Рябь) <span class="val-disp" id="val-wave">20</span></label>
      <input type="range" id="wave" min="0" max="150" step="1" value="20">
    </div>
    <div class="control-group">
      <label>Скорость скролла сетки <span class="val-disp" id="val-grid-spd">Норма</span></label>
      <input type="range" id="grid-spd" min="0" max="10" step="0.5" value="1">
    </div>

    <!-- АНИМАЦИЯ -->
    <div class="section-title">Общая Анимация</div>
    <div class="control-group">
      <label>Множитель скорости <span class="val-disp" id="val-spd">1.0x</span></label>
      <input type="range" id="spd" min="0" max="5" step="0.1" value="1">
    </div>

    <button class="btn" id="copy-btn">Активировать для OBS</button>
    <div id="obs-link-box"></div>
    <div class="hint">Это сгенерирует прямую ссылку. Панель будет скрыта автоматически в программе для захвата.</div>
  </div>

  <script>
    const root = document.documentElement;
    const urlParams = new URLSearchParams(window.location.search);
    
    function hexToRgb(hex) {
      let r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return r ? `${parseInt(r[1], 16)}, ${parseInt(r[2], 16)}, ${parseInt(r[3], 16)}` : '0,0,0';
    }

    const formatterPlusMinus = v => (v > 0 ? '+' : '') + v;

    // List of all controls and properties
    const state = {
      c1: { id: 'c1', css: '--color1', type: 'color', default: '#FFD700' },
      c2: { id: 'c2', css: '--color2', type: 'color', default: '#00BFFF' },
      bgc: { id: 'bgc', css: '--bg-color', type: 'hex', default: '#050505' },
      bright: { id: 'bright', css: '--brightness', type: 'float', default: 1.2, formatter: v => parseFloat(v).toFixed(1) },
      blur: { id: 'blur', css: '--blur-amount', type: 'px', default: 100, formatter: v => v+'px' },
      dist: { id: 'dist', css: '--distance', type: 'vw', default: 0, formatter: v => formatterPlusMinus(v)+'%' },
      rot: { id: 'rot', css: '--bg-rotate', type: 'deg', default: 0, formatter: v => formatterPlusMinus(v)+'°' },
      glow: { id: 'glow', css: '--center-glow', type: 'pct', default: 0, formatter: v => formatterPlusMinus(v)+'%' },
      vig: { id: 'vig', css: '--vignette-str', type: 'pct', default: 80, formatter: v => v+'%' },
      gop: { id: 'grid-op', css: '--grid-opacity', type: 'pct', default: 5, formatter: v => v+'%' },
      gsz: { id: 'grid-sz', css: '--grid-size', type: 'px', default: 50, formatter: v => v+'px' },
      gpt: { id: 'grid-pitch', css: '--grid-pitch', type: 'deg', default: 0, formatter: v => v+'°' },
      wave: { id: 'wave', attr: 'scale', el: 'wave-disp', type: 'attr', default: 20, formatter: v => v },
      gsp: { id: 'grid-spd', css: '--grid-speed', type: 'speed', default: 1, formatter: v => {
          if (v == 0) return 'Выкл';
          if (v == 1) return 'Норма';
          return v + 'x';
      }},
      spd: { id: 'spd', css: '--speed-mult', type: 'float', default: 1, formatter: v => parseFloat(v).toFixed(1)+'x' }
    };

    const isObs = urlParams.get('obs') === '1';
    const uiPanel = document.getElementById('ui-panel');
    const toggleBtn = document.getElementById('btn-toggle-ui');
    
    if (isObs) {
        uiPanel.classList.add('hidden');
        toggleBtn.style.display = 'none';
    }

    toggleBtn.onclick = () => uiPanel.classList.toggle('hidden');

    Object.keys(state).forEach(key => {
      let paramVal = urlParams.get(key);
      let el = document.getElementById(state[key].id);
      if (paramVal !== null) {
          if (state[key].type === 'color' || state[key].type === 'hex') {
              el.value = '#' + paramVal;
          } else {
              el.value = paramVal;
          }
      }
      
      el.addEventListener('input', () => updateCSS(key, el.value));
      updateCSS(key, el.value);
    });

    function updateCSS(key, value) {
      const s = state[key];
      let displayEl = document.getElementById('val-' + s.id);
      
      if (s.formatter && displayEl) displayEl.textContent = s.formatter(value);

      if (s.attr) document.getElementById(s.el).setAttribute(s.attr, value);
      else if (s.type === 'color') root.style.setProperty(s.css, hexToRgb(value));
      else if (s.type === 'hex') root.style.setProperty(s.css, value);
      else if (s.type === 'px') root.style.setProperty(s.css, value + 'px');
      else if (s.type === 'vw') root.style.setProperty(s.css, value + 'vw');
      else if (s.type === 'deg') root.style.setProperty(s.css, value + 'deg');
      else if (s.type === 'pct') root.style.setProperty(s.css, (parseFloat(value) / 100).toFixed(3));
      else if (s.type === 'speed') {
          // grid speed CSS animation duration. 1x = 10s, 0.5x=20s, 2x=5s.
          let spd = parseFloat(value);
          let duration = spd > 0 ? (10 / spd) + 's' : '999999s';
          if (spd === 0) document.getElementById('grid-layer').style.animationPlayState = 'paused';
          else {
              document.getElementById('grid-layer').style.animationPlayState = 'running';
              root.style.setProperty(s.css, duration);
          }
      }
      else root.style.setProperty(s.css, value);
    }

    const copyBtn = document.getElementById('copy-btn');
    const linkBox = document.getElementById('obs-link-box');
    
    copyBtn.addEventListener('click', () => {
      let currentUrl = new URL(window.location.href);
      
      Object.keys(state).forEach(key => {
          let val = document.getElementById(state[key].id).value;
          if (state[key].type === 'color' || state[key].type === 'hex') val = val.substring(1);
          currentUrl.searchParams.set(key, val);
      });
      currentUrl.searchParams.set('obs', '1');
      
      try { navigator.clipboard.writeText(currentUrl.toString()); } catch (e) {}
      
      copyBtn.textContent = 'Ссылка настроена и готова!';
      linkBox.style.display = 'block';
      linkBox.textContent = currentUrl.toString();
      setTimeout(() => { copyBtn.textContent = 'Активировать для OBS'; }, 3000);
    });
  </script>
</body>
</html>
